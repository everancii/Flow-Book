name: audiobookflow
description:
  "Flow Book: A modern Flutter app for Librivox audiobooks and YouTube streaming.
  Browse, listen, and manage your library with ease, featuring smart caching and
  personalized recommendations."

publish_to: "none"

version: 1.1.8+1

environment:
  sdk: ^3.5.4
  flutter: 3.44.1
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  fpdart: ^1.1.1
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  google_fonts: ^8.1.0
  go_router: ^17.2.3
  hive: ^2.2.3
  flutter_media_metadata:
    git:
      url: https://github.com/sagarchaulagai/flutter_media_metadata.git
      ref: 7666c7b40f3d9281f1d766f885ecd17b19177901
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  audio_service: ^0.18.18
  transparent_image: ^2.0.1
  just_audio:
    git:
      url: https://github.com/sagarchaulagai/just_audio.git
      path: just_audio
      ref: a6f8db8ded43bdff0e39766fbbdbab8f22cadc2c
  just_audio_background: ^0.0.1-beta.17
  rxdart: ^0.28.0
  audio_video_progress_bar: ^2.0.3
  provider: ^6.1.2
  we_slide: ^2.4.0
  permission_handler: ^12.0.1
  background_downloader: ^9.2.4
  media_store_plus: ^0.1.3
  intl: ^0.20.2
  url_launcher: ^6.3.1
  device_info_plus: ^13.1.0
  flutter_background: ^1.3.0+1
  connectivity_plus: ^7.0.0
  back_button_interceptor: ^8.0.0
  visibility_detector: ^0.4.0+2
  open_file: ^3.5.10
  youtube_explode_dart:
    git:
      url: https://github.com/sheikhhaziq/youtube_explode_dart.git
      ref: 0dc5514
  file_picker: ^12.0.0-beta.5
  path: ^1.9.1
  image_picker: ^1.1.2
  logger: ^2.6.1
  meta: ^1.16.0
  flutter_inappwebview: ^6.1.5
  saf:
    git:
      url: https://github.com/sagarchaulagai/saf.git
      ref: d0ecbf965408ac3627a28251d125485df2db356e
  audio_session: ^0.2.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.2
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0    # keep ONLY here (not under flutter_launcher_icons)

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon.png
  image_path_android: assets/icon.png

  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  assets:
    - assets/icon.png
    - assets/language_subjects.txt
    - assets/version.json
